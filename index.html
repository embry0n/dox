<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        .card{
            width:350px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            margin-bottom:20px;
            color:#243b55;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            background:#f0f0f0;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#243b55;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#141e30;
            transform:scale(1.03);
        }

        p{
            color:red;
            margin: 0px 0px 20px 0px;
        }

    </style>

</head>
<body>

    <div class="card">

        <h1>Авторизация</h1>

        <form action="/login" method="POST">

            <input
                type="text"
                name="username"
                placeholder="Введите имя"
                required
            >
            
            <!--
                Поздравляю, мой дорогуй друг с деменцией 
                Вот тут твой пароль
            -->
            <!--
                saulgoodmanCartele0377
            -->

            <input
                type="password"
                name='password'"
                placeholder="Введите пароль"
                required
            >

            {% if error %}
                <p>{{ error }}</p>
            {% endif %}

            <button type="submit">
                Войти
            </button>

        </form>

    </div>

</body>
</html>
